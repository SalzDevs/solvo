<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			// Apply the saved theme before first paint to avoid a flash of the
			// default palette. The cookie is set by the settings form action in
			// sync with the persisted theme; missing/unknown values fall back to
			// the default theme (no data-theme attribute).
			(function () {
				try {
					var match = document.cookie.match(/(?:^|;\s*)solvo-theme=([^;]+)/);
					var theme = match ? decodeURIComponent(match[1]) : '';
					if (theme && theme !== 'default') {
						document.documentElement.setAttribute('data-theme', theme);
					} else {
						document.documentElement.removeAttribute('data-theme');
					}
				} catch (_) {
					/* ignore: cookie read failures should never block render */
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
